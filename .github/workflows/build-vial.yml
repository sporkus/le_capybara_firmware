name: vial build
on:
  workflow_dispatch:
  push:
    paths:
      - 'keyboards/**'
      - '.github/workflows/*'
    tags:
      - 'v*'

jobs:

  get-build-container:
    runs-on: ubuntu-latest
    outputs:
      container: ${{ steps.get-container.outputs.container }}
    steps:
      - name: Get container image from vial-qmk upstream
        id: get-container
        run: |
          IMAGE=$(curl -fsSL https://raw.githubusercontent.com/vial-kb/vial-qmk/vial/.github/workflows/ci.yml | grep -m1 'container: ghcr.io' | awk '{print $2}')
          echo "container=$IMAGE" >> $GITHUB_OUTPUT

  compile-vial:
    runs-on: ubuntu-latest
    needs: get-build-container
    container: ${{ needs.get-build-container.outputs.container }}

    steps:
      - name: Checkout VIAL QMK
        uses: actions/checkout@v4
        with:
          repository: vial-kb/vial-qmk
          ref: vial
          submodules: true

      - name: Checkout firmware
        uses: actions/checkout@v4
        with:
          path: tmp
          persist-credentials: false

      - name: Setup safe directory
        run: git config --global --add safe.directory '*'

      - name: Copy keyboard files
        run: cp -r tmp/keyboards/sporkus keyboards/

      - name: compile vial
        run: make sporkus/le_capybara:vial

      - name: Archive firmware
        uses: actions/upload-artifact@v4
        with:
          retention-days: 60
          path: |
            *.hex
            *.bin
            *.uf2

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            *.hex
            *.bin
            *.uf2
