<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EC Calibration</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0d0d0d;
  color: #cccccc;
  font-family: 'Courier New', Courier, monospace;
  font-size: 13px;
  padding: 24px;
  min-height: 100vh;
}

#toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

#title {
  color: #FFA500;
  font-weight: bold;
  font-size: 14px;
}

#status {
  color: #888888;
}

#cal-banner {
  display: none;
  margin: 12px 0;
  padding: 14px 20px;
  border: 1px solid #FF8800;
  background: #1a0f00;
  color: #FF8800;
  font-size: 13px;
  max-width: 600px;
}
#cal-banner .cal-phase {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: #885500;
  margin-bottom: 4px;
}
#cal-banner .cal-msg {
  color: #FFA500;
  font-weight: bold;
}

#connect-btn, #disconnect-btn, #cal-btn, #jab-btn, #clear-btn {
  font-family: 'Courier New', Courier, monospace;
  font-size: 12px;
  padding: 4px 14px;
  cursor: pointer;
  border: 1px solid;
  background: transparent;
}
#connect-btn {
  color: #FFA500;
  border-color: #FFA500;
}
#connect-btn:hover { background: #1a0f00; }
#connect-btn:disabled { color: #555; border-color: #555; cursor: default; background: transparent; }

#disconnect-btn {
  color: #888;
  border-color: #555;
  display: none;
}
#disconnect-btn:hover { background: #1a1a1a; }

#cal-btn {
  display: none;
  color: #888;
  border-color: #555;
}
#cal-btn:hover { background: #1a1a1a; }
#cal-btn.active {
  color: #FF8800;
  border-color: #FF8800;
}

#jab-btn {
  color: #888;
  border-color: #555;
}
#jab-btn:hover { background: #1a1a1a; }
#jab-btn.active {
  color: #FF4488;
  border-color: #FF4488;
}

#clear-btn {
  color: #888;
  border-color: #555;
}
#clear-btn:hover { background: #1a1a1a; }

#jab-section {
  margin-top: 24px;
  max-width: 900px;
  display: none;
}
#jab-canvases {
  display: flex;
  gap: 10px;
}
.jab-panel {
  flex: 1;
  min-width: 0;
}
.jab-panel-label {
  color: #555;
  font-size: 11px;
  margin-bottom: 4px;
}
.jab-cv {
  display: block;
  width: 100%;
  height: 200px;
  background: #111111;
  border: 1px solid #2a2a2a;
}
#jab-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
  color: #666;
  flex-wrap: wrap;
}
#gamma-slider  { accent-color: #FF8800; width: 160px; cursor: pointer; }
#gamma-val     { color: #FF8800; min-width: 28px; }
#bottom-slider { accent-color: #33AAFF; width: 160px; cursor: pointer; }
#bottom-val    { color: #33AAFF; min-width: 32px; }
#idle-slider   { accent-color: #888;   width: 160px; cursor: pointer; }
#idle-val      { color: #aaa;   min-width: 32px; }
.bump-btn {
  font-family: 'Courier New', Courier, monospace;
  font-size: 12px;
  padding: 1px 8px;
  cursor: pointer;
  border: 1px solid #333;
  background: transparent;
  color: #666;
}
.bump-btn:hover { background: #1a1a1a; color: #aaa; }
#jab-chips {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  min-height: 22px;
  flex-wrap: wrap;
}
.jab-chip {
  font-size: 11px;
  padding: 2px 8px;
  border: 1px solid #444;
  color: #aaa;
  background: #161616;
}
#jab-analysis {
  margin-top: 8px;
  color: #666;
  line-height: 1.8;
  min-height: 1em;
}
#jab-analysis code  { color: #FF8800; }
#jab-analysis .hi   { color: #ffffff; }

#error {
  color: #FF4444;
  margin-bottom: 10px;
  min-height: 1em;
}

#panels {
  display: none;
  flex-direction: row;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.panel {
  border: 1px solid #222;
  padding: 10px 16px 12px;
  min-width: 240px;
}
.panel-title {
  font-size: 10px;
  letter-spacing: 0.12em;
  color: #444;
  margin-bottom: 8px;
}
.panel-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;
  font-size: 12px;
  white-space: nowrap;
}
.panel-row:last-child { margin-bottom: 0; }
.p-lbl  { color: #555; min-width: 64px; }
.p-val  { color: #aaa; min-width: 32px; }
.p-hint { color: #2e2e2e; font-size: 11px; }

#tables { overflow-x: auto; }

table {
  border-collapse: collapse;
  font-family: 'Courier New', Courier, monospace;
  font-size: 12px;
  white-space: nowrap;
}

th {
  color: #555;
  font-weight: normal;
  text-align: center;
  padding: 2px 6px;
  min-width: 52px;
}
th.row-label { text-align: left; min-width: 36px; color: #444; }
th.tbl-header {
  text-align: left;
  padding-bottom: 6px;
  color: #555;
  font-size: 11px;
  letter-spacing: 0.05em;
}

td.row-label { text-align: left; color: #555; min-width: 36px; padding: 3px 6px; }

td.key-cell {
  text-align: center;
  padding: 4px 6px;
  min-width: 52px;
  cursor: pointer;
  border: 1px solid transparent;
  vertical-align: middle;
}
td.key-cell:hover { background: #1a1a1a; }
td.key-cell.sel   { border-color: #33AAFF55; background: #0a1520; }

.key-travel { font-size: 12px; }
.key-adc    { font-size: 10px; color: #444; margin-top: 1px; }

td.key-cell.actuated .key-travel { color: #FF4422; }
td.key-cell.at-rest  .key-travel { color: #888; }
td.key-cell.missing  .key-travel { color: #333; }

.unsupported {
  color: #FF4444;
  margin: 20px 0;
}
</style>
</head>
<body>

<div id="toolbar">
  <span id="title"> EC Calibration </span>
  <span id="status">○  not connected</span>
  <button id="connect-btn" tabindex="-1">Connect Keyboard</button>
  <button id="disconnect-btn" tabindex="-1">Disconnect</button>
  <button id="cal-btn" tabindex="-1">Calibrate</button>
</div>

<div id="error"></div>
<div id="cal-banner">
  <div class="cal-phase"></div>
  <div class="cal-msg"></div>
</div>
<div id="panels">
  <div class="panel">
    <div class="panel-title">GLOBAL</div>
    <div class="panel-row">
      <span class="p-lbl">gamma</span>
      <input type="range" id="gamma-slider" min="0.5" max="6" step="0.1" value="3.0">
      <span id="gamma-val">3.0</span>
      <span class="p-hint">adjust until transformed trace is linear</span>
    </div>
    <div class="panel-row">
      <span class="p-lbl">actuation</span>
      <button class="bump-btn" id="act-down-btn" tabindex="-1">−</button>
      <span id="actuation-val" class="p-val">—</span>
      <button class="bump-btn" id="act-up-btn" tabindex="-1">+</button>
      <span class="p-lbl" style="margin-left:10px">release</span>
      <span id="release-val" class="p-val">—</span>
    </div>
  </div>
  <div class="panel">
    <div class="panel-title" id="key-panel-title">SELECTED KEY</div>
    <div class="panel-row">
      <span class="p-lbl">bottom</span>
      <input type="range" id="bottom-slider" min="300" max="1023" step="1" value="800">
      <span id="bottom-val">—</span>
      <span class="p-hint">drag to fine-tune per key</span>
    </div>
    <div class="panel-row">
      <span class="p-lbl">idle</span>
      <input type="range" id="idle-slider" min="0" max="800" step="1" value="300">
      <span id="idle-val">—</span>
    </div>
  </div>
</div>
<div id="jab-section">
  <div id="jab-canvases">
    <div class="jab-panel">
      <div class="jab-panel-label">Raw ADC</div>
      <canvas id="jab-cv-raw" class="jab-cv"></canvas>
    </div>
    <div class="jab-panel">
      <div class="jab-panel-label">Travel % (gamma transformed)</div>
      <canvas id="jab-cv-xform" class="jab-cv"></canvas>
    </div>
  </div>
  <div id="jab-chips"></div>
  <div id="jab-controls">
    <button id="jab-btn" tabindex="-1">Start Graph</button>
    <button id="clear-btn" tabindex="-1">Clear</button>
  </div>
  <div id="jab-analysis"></div>
</div>
<div id="tables"></div>

<script>
'use strict';

// ─── State ────────────────────────────────────────────────────────────────────

function newKeyCal()  { return { idle: 0, bottom: 0 }; }
function newKeyLive() { return { adc: 0, travel: 0, valid: false }; }

function newECState(rows, cols) {
  return {
    config: {
      rows, cols,
      actuationOffset: 0,
      releaseOffset:   0,
      configured:      false,
      bottomingCal:    false,
      minTravel:       0,
      defaultBottom:   0,
      gamma:           1.0,
    },
    cal:      Array.from({length: rows}, () => Array.from({length: cols}, newKeyCal)),
    live:     Array.from({length: rows}, () => Array.from({length: cols}, newKeyLive)),
    tuiMode:  false,
    calMode:  false,
    calPhase: 0,
    ready:    false,
  };
}

function keyCalibrated(s, r, c) {
  if (r < 0 || r >= s.config.rows || c < 0 || c >= s.config.cols) return false;
  const k = s.cal[r][c];
  if (k.bottom === 0 && k.idle === 0) return false;
  const travel = k.bottom - k.idle;
  const minT   = (s.config.defaultBottom - k.idle) * s.config.minTravel / 100;
  return travel >= minT && travel > 0;
}

function travelPercent(cal, adc, gamma) {
  const idle   = cal.idle;
  const bottom = cal.bottom;
  if (bottom <= idle) return 0;
  let raw = (adc - idle) / (bottom - idle);
  if (raw < 0) raw = 0;
  if (raw > 1) raw = 1;
  if (gamma <= 0) gamma = 1;
  return Math.pow(raw, gamma) * 100;
}

// ─── Parser ───────────────────────────────────────────────────────────────────

function parseLine(line, s) {
  const idx = line.lastIndexOf(': ');
  if (idx !== -1) line = line.substring(idx + 2);
  if (!line.startsWith('EC_')) return;

  // No-colon events
  if (line === 'EC_JAB_START') { jabHandleStart(); return; }
  if (line === 'EC_JAB_END')   { jabHandleEnd();   return; }

  const colon = line.indexOf(':');
  if (colon === -1) return;
  const tag  = line.substring(0, colon);
  const body = line.substring(colon + 1);

  switch (tag) {
    case 'EC_CFG':        parseConfig(body, s);         break;
    case 'EC_IDLE':       parseCalRow(body, s, 'idle');  break;
    case 'EC_BOTTOM':     parseCalRow(body, s, 'bottom');break;
    case 'EC_ADC':        parseADCRow(body, s);          break;
    case 'EC_KEY_BOTTOM': parseKeyBottom(body, s);       break;
    case 'EC_EVENT':      parseEvent(body, s);           break;
    case 'EC_JAB':        jabHandleValues(body);         break;
  }
}

function parseConfig(body, s) {
  const kv = {};
  for (const part of body.split(',')) {
    const eq = part.indexOf('=');
    if (eq === -1) continue;
    kv[part.substring(0, eq).trim()] = part.substring(eq + 1).trim();
  }

  const rows = parseInt(kv.rows) || 0;
  const cols = parseInt(kv.cols) || 0;
  if (rows <= 0 || cols <= 0) return;

  if (!s.ready || s.config.rows !== rows || s.config.cols !== cols) {
    const ns = newECState(rows, cols);
    ns.config   = s.config;
    ns.tuiMode  = s.tuiMode;
    ns.calMode  = s.calMode;
    ns.calPhase = s.calPhase;
    Object.assign(s, ns);
    s.ready = true;
  }

  s.config.rows             = rows;
  s.config.cols             = cols;
  updateGraphDropdowns();
  s.config.actuationOffset  = parseInt(kv.act)            || 0;
  s.config.releaseOffset    = parseInt(kv.rel)            || 0;
  s.config.minTravel        = parseInt(kv.min_travel)     || 0;
  s.config.defaultBottom    = parseInt(kv.default_bottom) || 0;
  s.config.configured       = kv.configured    === '1';
  s.config.bottomingCal     = kv.bottoming_cal === '1';
  const gammaScaled = parseInt(kv.gamma) || 0;
  if (gammaScaled > 0) {
    s.config.gamma = gammaScaled / 100.0;
    if (!jabGammaSeeded) {
      jabGamma       = s.config.gamma;
      jabGammaSeeded = true;
      document.getElementById('gamma-slider').value    = jabGamma;
      document.getElementById('gamma-val').textContent = jabGamma.toFixed(1);
      redrawJab();
    }
  }
}

function parseCalRow(body, s, kind) {
  const colon = body.indexOf(':');
  if (colon === -1) return;
  const row = parseInt(body.substring(0, colon));
  if (isNaN(row) || row < 0 || row >= s.config.rows) return;
  parseCSV(body.substring(colon + 1)).forEach((v, c) => {
    if (c >= s.config.cols) return;
    s.cal[row][c][kind] = v;
  });
  if (kind === 'bottom') syncBottomSlider();
}

function parseADCRow(body, s) {
  if (!s.ready) return;
  const colon = body.indexOf(':');
  if (colon === -1) return;
  const row = parseInt(body.substring(0, colon));
  if (isNaN(row) || row < 0 || row >= s.config.rows) return;
  const gamma = s.config.gamma > 0 ? s.config.gamma : 1;
  parseCSV(body.substring(colon + 1)).forEach((adc, c) => {
    if (c >= s.config.cols) return;
    s.live[row][c].adc    = adc;
    s.live[row][c].travel = travelPercent(s.cal[row][c], adc, gamma);
    s.live[row][c].valid  = true;
  });
}

function parseKeyBottom(body, s) {
  const colon = body.indexOf(':');
  if (colon === -1) return;
  const coords = body.substring(0, colon).split(',');
  if (coords.length !== 2) return;
  const row = parseInt(coords[0]);
  const col = parseInt(coords[1]);
  const val = parseInt(body.substring(colon + 1).trim());
  if (isNaN(row) || isNaN(col) || isNaN(val)) return;
  if (row < 0 || row >= s.config.rows || col < 0 || col >= s.config.cols) return;
  s.cal[row][col].bottom = val;
  const gamma = s.config.gamma > 0 ? s.config.gamma : 1;
  s.live[row][col].travel = travelPercent(s.cal[row][col], s.live[row][col].adc, gamma);
}

function parseEvent(body, s) {
  switch (body.trim()) {
    case 'tuiStarted':    s.tuiMode = true;                              break;
    case 'tuiStopped':    s.tuiMode = false; s.calMode = false; s.calPhase = 0; break;
    case 'calStarted':    s.calMode = true;  s.calPhase = 1;             break;
    case 'calTuningDone': s.calPhase = 2;                                break;
    case 'calSaved':      s.calMode = false; s.calPhase = 0;             break;
  }
}

function parseCSV(str) {
  return str.split(',').map(s => parseInt(s.trim())).filter(v => !isNaN(v));
}

// ─── Render ───────────────────────────────────────────────────────────────────

let state = newECState(0, 0);

// Persistent cell references — rebuilt only when matrix dimensions change
let cellMap      = [];
let tableRows    = -1;
let tableCols    = -1;

function buildTable(s) {
  const tablesEl = document.getElementById('tables');
  tablesEl.innerHTML = renderKeyMatrix(s);
  tableRows = s.config.rows;
  tableCols = s.config.cols;
  cellMap = Array.from({length: s.config.rows}, (_, r) =>
    Array.from({length: s.config.cols}, (_, c) =>
      tablesEl.querySelector(`td[data-row="${r}"][data-col="${c}"]`)
    )
  );
}

function updateKeyCells(s) {
  for (let r = 0; r < s.config.rows; r++) {
    for (let c = 0; c < s.config.cols; c++) {
      const td = cellMap[r] && cellMap[r][c];
      if (!td) continue;
      const live  = s.live[r][c];
      const cal   = s.cal[r][c];
      const isSel = r === selRow && c === selCol;

      let travelEl = td.querySelector('.key-travel');
      let adcEl    = td.querySelector('.key-adc');

      if (!live.valid) {
        td.className = 'key-cell missing' + (isSel ? ' sel' : '');
        if (!travelEl) { td.innerHTML = '<div class="key-travel">✗</div>'; }
        else { travelEl.textContent = '✗'; adcEl && adcEl.remove(); }
      } else {
        const t   = live.travel;
        const cls = t >= s.config.actuationOffset ? 'actuated' : 'at-rest';
        td.className = `key-cell ${cls}` + (isSel ? ' sel' : '');

        const adcText = keyCalibrated(s, r, c)
          ? `${cal.bottom} / ${live.adc}`
          : `${live.adc}`;

        if (!travelEl) {
          td.innerHTML = `<div class="key-travel">${Math.round(t)}%</div><div class="key-adc">${adcText}</div>`;
        } else {
          travelEl.textContent = Math.round(t) + '%';
          if (!adcEl) { adcEl = document.createElement('div'); adcEl.className = 'key-adc'; td.appendChild(adcEl); }
          adcEl.textContent = adcText;
        }
      }
    }
  }
}

function render() {
  const s = state;
  const statusEl = document.getElementById('status');
  const tablesEl = document.getElementById('tables');

  if (!s.ready) {
    statusEl.className   = '';
    statusEl.textContent = '○  not connected';
    tablesEl.innerHTML   = '';
    tableRows = -1; tableCols = -1; cellMap = [];
    return;
  }

  const calBtn    = document.getElementById('cal-btn');
  const banner    = document.getElementById('cal-banner');
  const bannerPh  = banner.querySelector('.cal-phase');
  const bannerMsg = banner.querySelector('.cal-msg');

  statusEl.className   = '';
  statusEl.textContent = '● connected';

  if (s.calPhase === 1) {
    banner.style.display  = 'block';
    bannerPh.textContent  = 'CALIBRATION — PHASE 1 OF 2';
    bannerMsg.textContent = 'Lift all fingers and keep keys at rest — tuning baseline…';
  } else if (s.calPhase === 2) {
    banner.style.display  = 'block';
    bannerPh.textContent  = 'CALIBRATION — PHASE 2 OF 2';
    bannerMsg.textContent = 'Bottom every key fully, then press Calibrate to save.';
  } else {
    banner.style.display  = 'none';
  }

  calBtn.className   = s.calMode ? 'active' : '';
  calBtn.textContent = s.calMode ? 'Save Cal' : 'Calibrate';

  document.getElementById('actuation-val').textContent = s.config.actuationOffset + '%';
  document.getElementById('release-val').textContent   = s.config.releaseOffset   + '%';

  if (s.config.rows !== tableRows || s.config.cols !== tableCols) {
    buildTable(s);
  } else {
    updateKeyCells(s);
  }
}

function renderKeyMatrix(s) {
  const headers = Array.from({length: s.config.cols}, (_, c) => `<th>C${c}</th>`).join('');
  let rows = '';
  for (let r = 0; r < s.config.rows; r++) {
    rows += `<tr><td class="row-label">R${r}</td>`;
    for (let c = 0; c < s.config.cols; c++) {
      const live = s.live[r][c];
      const cal  = s.cal[r][c];
      const sel  = r === selRow && c === selCol ? ' sel' : '';
      if (!live.valid) {
        rows += `<td class="key-cell missing${sel}" data-row="${r}" data-col="${c}"><div class="key-travel">✗</div></td>`;
      } else {
        const t   = live.travel;
        const cls = t >= s.config.actuationOffset ? 'actuated' : 'at-rest';
        const btm = keyCalibrated(s, r, c) ? `<div class="key-adc">${cal.bottom} / ${live.adc}</div>` : `<div class="key-adc">${live.adc}</div>`;
        rows += `<td class="key-cell ${cls}${sel}" data-row="${r}" data-col="${c}"><div class="key-travel">${Math.round(t)}%</div>${btm}</td>`;
      }
    }
    rows += '</tr>';
  }
  return `<div class="tbl-wrap"><table>
    <tr><th class="tbl-header" colspan="${s.config.cols + 1}">KEY MATRIX — click any key to graph</th></tr>
    <tr><th class="row-label"></th>${headers}</tr>
    ${rows}
  </table></div>`;
}

// ─── Jab capture ──────────────────────────────────────────────────────────────

let selRow = 0, selCol = 0;  // source of truth for selected key

function setSelKey(row, col) {
  selRow = row;
  selCol = col;
}

let jabSamples      = [];
let jabRecording    = false;
let jabCurrentValue = 0;
let jabGamma        = 1.0;
let jabGammaSeeded  = false;

function jabHandleStart() {
  jabSamples      = [];
  jabRecording    = true;
  jabCurrentValue = 0;
  updateRawLabel();
  syncBottomSlider();
  document.getElementById('jab-analysis').textContent = '';
  document.getElementById('jab-btn').textContent      = 'Stop';
  document.getElementById('jab-btn').classList.add('active');
  redrawJab();
}

function jabHandleValues(body) {
  if (!jabRecording) return;
  const vals = parseCSV(body);
  vals.forEach(v => jabSamples.push(v));
  if (vals.length > 0) jabCurrentValue = vals[vals.length - 1];
  redrawJab();
}

function jabHandleEnd() {
  jabRecording = false;
  document.getElementById('jab-btn').textContent = 'Start Graph';
  document.getElementById('jab-btn').classList.remove('active');
  redrawJab();
}

function jabClear() {
  jabSamples      = [];
  jabCurrentValue = 0;
  redrawJab();
}

function jabRefs() {
  const cal   = state.cal[selRow] && state.cal[selRow][selCol];
  const calOk = cal && cal.idle > 0 && cal.bottom > cal.idle;
  const idle   = calOk ? cal.idle   : (jabSamples.length ? Math.min(...jabSamples) : 0);
  const bottom = calOk ? cal.bottom : (jabSamples.length ? Math.max(...jabSamples) : 1);
  const actPct = state.config.actuationOffset || 50;
  const actAdc = idle + (bottom - idle) * Math.pow(actPct / 100, 1 / jabGamma);
  return { idle, bottom, actPct, actAdc, calOk };
}

function updateJabChips({ idle, bottom }) {
  const el = document.getElementById('jab-chips');
  if (!el) return;
  const chips = [];
  const travel = bottom - idle || 1;
  const xfrm = adc => Math.pow(Math.max(0, Math.min(1, (adc - idle) / travel)), jabGamma) * 100;

  if (jabCurrentValue > 0) {
    const pct = xfrm(jabCurrentValue);
    chips.push(`<span class="jab-chip live">ADC ${jabCurrentValue} &nbsp; ${pct.toFixed(0)}%</span>`);
  }
  el.innerHTML = chips.join('');
}

function redrawJab() {
  const r = jabRefs();
  drawJabRaw(r);
  drawJabXform(r);
  updateJabChips(r);
  updateJabAnalysis(r);
}

// Shared helper: draw a horizontal line
function hline(ctx, y, W, color, dashed) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth   = 1;
  if (dashed) ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  ctx.restore();
}

function drawJabRaw({ idle, bottom, actPct, actAdc }) {
  const cv  = document.getElementById('jab-cv-raw');
  if (!cv) return;
  const W   = cv.width  = cv.offsetWidth || 400;
  const H   = cv.height = 200;
  const ctx = cv.getContext('2d');
  const PAD = 8, LP = 38;

  ctx.fillStyle = '#111'; ctx.fillRect(0, 0, W, H);

  const range = bottom - idle || 1;
  const toX = i => LP + (i / Math.max(jabSamples.length - 1, 1)) * (W - LP - PAD);
  const toY = v => H - PAD - Math.max(0, Math.min(1, (v - idle) / range)) * (H - 2 * PAD);

  // Reference lines
  hline(cv.getContext('2d'), toY(idle),   W, '#2a2a2a');
  hline(cv.getContext('2d'), toY(bottom), W, '#2a3a2a');
  hline(cv.getContext('2d'), toY(actAdc), W, '#FF880055', true);

  // Y-axis labels
  ctx.fillStyle = '#444'; ctx.font = '10px Courier New'; ctx.textAlign = 'right';
  [[idle, 'idle'], [actAdc, `act`], [bottom, 'btm']].forEach(([v, lbl]) => {
    ctx.fillStyle = v === actAdc ? '#FF8800aa' : '#444';
    ctx.fillText(`${lbl} ${Math.round(v)}`, LP - 2, Math.min(Math.max(toY(v) + 3, 10), H - 2));
  });
  ctx.textAlign = 'left';

  // Trace
  if (jabSamples.length > 1) {
    ctx.strokeStyle = '#666'; ctx.lineWidth = 1;
    ctx.beginPath();
    jabSamples.forEach((v, i) => { const x = toX(i), y = toY(v); i ? ctx.lineTo(x, y) : ctx.moveTo(x, y); });
    ctx.stroke();
  }

  // Floating current value
  if (jabCurrentValue > 0) {
    hline(ctx, toY(jabCurrentValue), W, '#66666688', true);
  }
}

function drawJabXform({ idle, bottom, actPct }) {
  const cv  = document.getElementById('jab-cv-xform');
  if (!cv) return;
  const W   = cv.width  = cv.offsetWidth || 400;
  const H   = cv.height = 200;
  const ctx = cv.getContext('2d');
  const PAD = 8, LP = 32;

  ctx.fillStyle = '#111'; ctx.fillRect(0, 0, W, H);

  const travel = bottom - idle || 1;
  const toX  = i   => LP + (i / Math.max(jabSamples.length - 1, 1)) * (W - LP - PAD);
  const toY  = pct => H - PAD - Math.max(0, Math.min(1, pct / 100)) * (H - 2 * PAD);
  const xfrm = adc => Math.pow(Math.max(0, Math.min(1, (adc - idle) / travel)), jabGamma) * 100;

  // Reference lines at 0%, actuation%, 100%
  hline(ctx, toY(0),      W, '#2a2a2a');
  hline(ctx, toY(100),    W, '#2a3a2a');
  hline(ctx, toY(actPct), W, '#FF880055', true);

  // Y labels
  ctx.font = '10px Courier New'; ctx.textAlign = 'right';
  [[0, '0%'], [actPct, `${actPct}%`], [100, '100%']].forEach(([p, lbl]) => {
    ctx.fillStyle = p === actPct ? '#FF8800aa' : '#444';
    ctx.fillText(lbl, LP - 2, Math.min(Math.max(toY(p) + 3, 10), H - 2));
  });
  ctx.textAlign = 'left';

  // Transformed trace
  if (jabSamples.length > 1) {
    ctx.strokeStyle = '#666'; ctx.lineWidth = 1;
    ctx.beginPath();
    jabSamples.forEach((v, i) => { const x = toX(i), y = toY(xfrm(v)); i ? ctx.lineTo(x, y) : ctx.moveTo(x, y); });
    ctx.stroke();
  }

  // Floating current (transformed)
  if (jabCurrentValue > 0) {
    hline(ctx, toY(xfrm(jabCurrentValue)), W, '#66666688', true);
  }
}

function updateJabAnalysis({ idle, bottom, actAdc, calOk }) {
  const el = document.getElementById('jab-analysis');
  if (!jabSamples.length) { el.textContent = ''; return; }
  if (!calOk) { el.textContent = 'no bottoming calibration — run bottoming cal first'; return; }
  el.innerHTML =
    `idle <span class="hi">${idle}</span> &nbsp;·&nbsp; ` +
    `bottom <span class="hi">${bottom}</span> &nbsp;·&nbsp; ` +
    `actuation threshold <span class="hi">${Math.round(actAdc)}</span> raw ADC &nbsp;·&nbsp; ` +
    `<code>TRAVEL_CURVE_GAMMA ${jabGamma.toFixed(1)}f</code>`;
}

document.getElementById('gamma-slider').addEventListener('input', e => {
  jabGamma = parseFloat(e.target.value);
  document.getElementById('gamma-val').textContent = jabGamma.toFixed(1);
  state.config.gamma = jabGamma;
  redrawJab();
  render();
});

function updateRawLabel() {
  document.getElementById('jab-cv-raw').closest('.jab-panel').querySelector('.jab-panel-label').textContent = `Raw ADC — R${selRow} C${selCol}`;
  document.getElementById('key-panel-title').textContent = `SELECTED KEY  R${selRow} C${selCol}`;
}

function syncKeyPanel() {
  const cal = state.cal[selRow] && state.cal[selRow][selCol];

  const btm = (cal && cal.bottom > 0) ? cal.bottom : null;
  const btmSlider = document.getElementById('bottom-slider');
  const btmVal    = document.getElementById('bottom-val');
  if (btm !== null) { btmSlider.value = btm; btmVal.textContent = btm; }
  else { btmVal.textContent = '—'; }

  const idl = (cal && cal.idle > 0) ? cal.idle : null;
  const idlSlider = document.getElementById('idle-slider');
  const idlVal    = document.getElementById('idle-val');
  if (idl !== null) { idlSlider.value = idl; idlVal.textContent = idl; }
  else { idlVal.textContent = '—'; }
}
function syncBottomSlider() { syncKeyPanel(); }

document.getElementById('bottom-slider').addEventListener('input', e => {
  const val = parseInt(e.target.value);
  document.getElementById('bottom-val').textContent = val;
  if (state.cal[selRow] && state.cal[selRow][selCol]) state.cal[selRow][selCol].bottom = val;
  sendCmd(EC_HID_SET_BOTTOM, selRow, selCol, (val >> 8) & 0xFF, val & 0xFF);
  redrawJab();
});

document.getElementById('idle-slider').addEventListener('input', e => {
  const val = parseInt(e.target.value);
  document.getElementById('idle-val').textContent = val;
  if (state.cal[selRow] && state.cal[selRow][selCol]) state.cal[selRow][selCol].idle = val;
  sendCmd(EC_HID_SET_IDLE, selRow, selCol, (val >> 8) & 0xFF, val & 0xFF);
  redrawJab();
});


function handleKeyClick(row, col) {
  setSelKey(row, col);
  jabSamples      = [];
  jabCurrentValue = 0;
  updateRawLabel();
  syncBottomSlider();
  if (connected) {
    if (jabRecording) {
      sendCmd(EC_HID_JAB_TOGGLE, 0, 0);
      sendCmd(EC_HID_JAB_TOGGLE, selRow, selCol);
    } else {
      sendCmd(EC_HID_JAB_TOGGLE, selRow, selCol);
    }
  }
  redrawJab();
  render();
}

// ─── Web HID ──────────────────────────────────────────────────────────────────

// EC tool HID commands - must match le_capybara.c
const EC_HID_KEEPALIVE  = 0x00;
const EC_HID_CAL_TOGGLE = 0x02;
const EC_HID_AP_INC     = 0x03;
const EC_HID_AP_DEC     = 0x04;
const EC_HID_JAB_TOGGLE = 0x05;
const EC_HID_SET_BOTTOM = 0x06;
const EC_HID_SET_IDLE   = 0x07;

let hidDevice       = null;
let connected       = false;
let lineBuf         = '';
let keepaliveTimer  = null;
const decoder       = new TextDecoder('utf-8', {fatal: false});

async function connect() {
  const errEl = document.getElementById('error');
  errEl.textContent = '';

  if (!navigator.hid) {
    errEl.textContent = 'Web HID not supported — use Chrome or Edge (version 89+)';
    return;
  }

  try {
    const devices = await navigator.hid.requestDevice({
      filters: [{ usagePage: 0xFF60, usage: 0x61 }]
    });
    if (!devices.length) return;

    if (hidDevice) {
      hidDevice.removeEventListener('inputreport', onReport);
      hidDevice.removeEventListener('disconnect', onDisconnect);
      try { await hidDevice.close(); } catch(_) {}
      hidDevice = null;
    }

    hidDevice = devices[0];
    await hidDevice.open();

    connected = true;
    lineBuf   = '';
    state     = newECState(0, 0);

    hidDevice.addEventListener('inputreport', onReport);
    hidDevice.addEventListener('disconnect', onDisconnect);

    document.getElementById('connect-btn').disabled         = true;
    document.getElementById('disconnect-btn').style.display = 'inline-block';
    document.getElementById('cal-btn').style.display        = 'inline-block';
    document.getElementById('panels').style.display         = 'flex';
    document.getElementById('jab-section').style.display    = 'block';
    updateGraphDropdowns();

    await sendCmd(EC_HID_KEEPALIVE);
    keepaliveTimer = setInterval(() => sendCmd(EC_HID_KEEPALIVE), 2000);
    render();
  } catch (e) {
    errEl.textContent = `Connection failed: ${e.message}`;
  }
}

async function disconnect() {
  clearInterval(keepaliveTimer);
  keepaliveTimer = null;
  if (hidDevice) {
    hidDevice.removeEventListener('inputreport', onReport);
    try { await hidDevice.close(); } catch(_) {}
    hidDevice = null;
  }
  connected      = false;
  state          = newECState(0, 0);
  jabGammaSeeded = false;

  document.getElementById('connect-btn').disabled         = false;
  document.getElementById('disconnect-btn').style.display = 'none';
  document.getElementById('cal-btn').style.display        = 'none';
  document.getElementById('panels').style.display         = 'none';
  document.getElementById('jab-section').style.display    = 'none';
  document.getElementById('status').className             = '';
  document.getElementById('status').textContent           = '○  not connected';
  document.getElementById('cal-banner').style.display     = 'none';
  document.getElementById('tables').innerHTML             = '';
  document.getElementById('error').textContent            = '';
}

function onDisconnect() {
  clearInterval(keepaliveTimer);
  keepaliveTimer = null;
  if (hidDevice) {
    hidDevice.removeEventListener('inputreport', onReport);
    hidDevice.removeEventListener('disconnect', onDisconnect);
    hidDevice = null;
  }
  connected      = false;
  lineBuf        = '';
  jabGammaSeeded = false;
  document.getElementById('error').textContent            = 'Keyboard disconnected.';
  document.getElementById('connect-btn').disabled         = false;
  document.getElementById('disconnect-btn').style.display = 'none';
  document.getElementById('cal-btn').style.display        = 'none';
  document.getElementById('panels').style.display         = 'none';
  document.getElementById('jab-section').style.display    = 'none';
}

function onReport(event) {
  const bytes = new Uint8Array(event.data.buffer);
  let end = bytes.length;
  while (end > 0 && bytes[end - 1] === 0) end--;
  if (end === 0) return;

  lineBuf += decoder.decode(bytes.subarray(0, end));

  const lines = lineBuf.split('\n');
  lineBuf = lines.pop();

  let changed = false;
  for (const line of lines) {
    const trimmed = line.trim();
    if (trimmed) {
      parseLine(trimmed, state);
      changed = true;
    }
  }
  if (changed) render();
}

async function sendCmd(cmd, ...extra) {
  if (!hidDevice || !hidDevice.opened) return;
  const buf = new Uint8Array(32);
  buf[0] = 0xEC; // EC_HID_PREFIX — falls to default case in Vial's raw_hid_receive
  buf[1] = cmd;
  extra.forEach((v, i) => buf[2 + i] = v);
  try {
    await hidDevice.sendReport(0, buf);
  } catch(e) {
    document.getElementById('error').textContent = `Send failed: ${e.message}`;
  }
}

function updateGraphDropdowns() {
  const rows = state.config.rows || 4;
  const cols = state.config.cols || 10;
  selRow = Math.min(selRow, rows - 1);
  selCol = Math.min(selCol, cols - 1);
}

function btnClick(id, fn) {
  document.getElementById(id).addEventListener('click', e => { e.currentTarget.blur(); fn(); });
}
document.getElementById('tables').addEventListener('click', e => {
  const td = e.target.closest('td[data-row]');
  if (!td) return;
  handleKeyClick(+td.dataset.row, +td.dataset.col);
});

btnClick('connect-btn',    connect);
btnClick('disconnect-btn', disconnect);
btnClick('cal-btn',        () => sendCmd(EC_HID_CAL_TOGGLE));
btnClick('act-down-btn', () => sendCmd(EC_HID_AP_DEC));
btnClick('act-up-btn',   () => sendCmd(EC_HID_AP_INC));
btnClick('jab-btn', () => {
  if (jabRecording) {
    sendCmd(EC_HID_JAB_TOGGLE, 0, 0);
  } else {
    sendCmd(EC_HID_JAB_TOGGLE, selRow, selCol);
  }
});
btnClick('clear-btn', jabClear);
</script>
